version: "3.9"

services:
  db:
    image: postgres:16
    container_name: shortener-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shortener
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: shortener-redis
    restart: always
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: shortener-app
    restart: always
    command: ["sh", "app.sh"]
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app
    depends_on:
      - db
      - redis
    env_file:
      - ./src/.env

  celery:
    build: .
    container_name: shortener-celery
    restart: always
    command: ["sh", "celery.sh"]
    volumes:
      - ./src:/app
    depends_on:
      - db
      - redis
    env_file:
      - ./src/.env

volumes:
  postgres_data: